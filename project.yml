name: Zeus
options:
  bundleIdPrefix: com.lightwave
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

# Swift packages for the on-device sideloader feature (app target only — the
# widget extension does not use them). ZIPFoundation reads Info.plist out of an
# .ipa; swift-certificates/-crypto/-asn1 mint the self-signed TLS identity that
# lets Zeus host the local OTA install server iOS's installd can trust.
packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: "0.9.0"
  swift-certificates:
    url: https://github.com/apple/swift-certificates
    from: "1.0.0"
  swift-crypto:
    url: https://github.com/apple/swift-crypto
    from: "3.0.0"
  swift-asn1:
    url: https://github.com/apple/swift-asn1
    from: "1.0.0"
  # OpenSSL (precompiled xcframework) — the crypto zsign links against to
  # re-sign apps on-device. App target only.
  OpenSSL:
    url: https://github.com/krzyzanowskim/OpenSSL
    from: "3.1.5000"

settings:
  base:
    MARKETING_VERSION: "0.3.7"
    CURRENT_PROJECT_VERSION: "1"
    VERSIONING_SYSTEM: "apple-generic"
    SWIFT_VERSION: "5.10"
    # Keep the processed Info.plist as XML. Xcode emits a *binary* plist in
    # archive by default, and the App Intents SSU training tool
    # (appintentsnltrainingprocessor) can't parse binary plists — it fails with
    # "Unable to parse Info.plist". Forcing XML lets that step read it.
    INFOPLIST_OUTPUT_FORMAT: "xml"
    # Also skip the SSU flexible-matching pass (belt-and-suspenders; only affects
    # on-device fuzzy phrase matching, not whether Siri/App Shortcuts work).
    ENABLE_APP_SHORTCUTS_FLEXIBLE_MATCHING: "NO"
    DEVELOPMENT_TEAM: "" # <- set your Apple Developer Team ID
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES

# App Groups let the app, widgets, and CarPlay share vehicle state + tokens.
# Replace the group id everywhere if you change it (also in AppGroup.swift).

targets:
  Zeus:
    type: application
    platform: iOS
    sources:
      - path: Sources/Zeus
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lightwave.zeus
        INFOPLIST_FILE: Sources/Zeus/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_ENTITLEMENTS: Sources/Zeus/Resources/Zeus.entitlements
    dependencies:
      - target: ZeusWidgets
      - target: CZsign
      - package: ZIPFoundation
      - package: swift-certificates
        product: X509
      - package: swift-crypto
        product: Crypto
      - package: swift-asn1
        product: SwiftASN1
      - package: OpenSSL
        product: OpenSSL

  # Vendored zsign (C/C++) that re-signs an extracted .app folder in-process,
  # wrapped by an Objective-C++ bridge (ZsignBridge) that Swift imports.
  CZsign:
    type: library.static
    platform: iOS
    sources:
      - path: Sources/CZsign
    settings:
      base:
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
        CLANG_CXX_LIBRARY: "libc++"
        GCC_C_LANGUAGE_STANDARD: "gnu11"
        DEFINES_MODULE: YES
        MODULEMAP_FILE: Sources/CZsign/include/module.modulemap
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/Sources/CZsign/include"
          - "$(SRCROOT)/Sources/CZsign/zsign"
          - "$(SRCROOT)/Sources/CZsign/zsign/common"
        # zsign is third-party C/C++; don't fail our build on its warnings.
        GCC_WARN_INHIBIT_ALL_WARNINGS: YES
        CLANG_WARN_DOCUMENTATION_COMMENTS: NO
    dependencies:
      - package: OpenSSL
        product: OpenSSL

  ZeusWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/ZeusWidgets
      - path: Sources/Zeus/Core
      - path: Sources/Zeus/DesignSystem
      - path: Sources/Zeus/Models
      - path: Sources/Zeus/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lightwave.zeus.widgets
        INFOPLIST_FILE: Sources/ZeusWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/ZeusWidgets/ZeusWidgets.entitlements

schemes:
  Zeus:
    build:
      targets:
        Zeus: all
        ZeusWidgets: all
    run:
      config: Debug
    archive:
      config: Release
