name: Zeus
options:
  bundleIdPrefix: com.zeus.bolt
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: "" # <- set your Apple Developer Team ID
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES

# App Groups let the app, widgets, and CarPlay share vehicle state + tokens.
# Replace the group id everywhere if you change it (also in AppGroup.swift).

targets:
  Zeus:
    type: application
    platform: iOS
    sources:
      - path: Sources/Zeus
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zeus.bolt
        INFOPLIST_FILE: Sources/Zeus/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_ENTITLEMENTS: Sources/Zeus/Resources/Zeus.entitlements
    dependencies:
      - target: ZeusWidgets

  ZeusWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/ZeusWidgets
      - path: Sources/Zeus/Core
      - path: Sources/Zeus/DesignSystem
      - path: Sources/Zeus/Models
      - path: Sources/Zeus/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zeus.bolt.widgets
        INFOPLIST_FILE: Sources/ZeusWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/ZeusWidgets/ZeusWidgets.entitlements

schemes:
  Zeus:
    build:
      targets:
        Zeus: all
        ZeusWidgets: all
    run:
      config: Debug
    archive:
      config: Release
